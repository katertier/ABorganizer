[package]
name         = "ab-transcript"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "Pipeline stages that orchestrate transcription + tag-text extractors. Sits on top of ab-speech (the Apple Speech / NaturalLanguage bridge); contains the head/tail / samples / full transcribe stages, language-normalize, the extractor framework, and the idle-priority Speech-model installer loop."

[lints]
workspace = true

[dependencies]
# C.4 EPUB name-dict stage delegates here for the pure-function
# EPUB walk + dictionary extraction (ADR-0043 § C.4).
ab-companion-extract = { workspace = true }
ab-core     = { workspace = true }
ab-db       = { workspace = true }
ab-pipeline = { workspace = true }
ab-speech   = { workspace = true }
# For Stage::requires() typed dependency on tag-read +
# consensus (description-lang waits for consensus to pick
# the description winner).
ab-tag-read = { workspace = true }
ab-catalog  = { workspace = true }
async-trait = { workspace = true }
regex       = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
sqlx        = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true }
tokio-util  = { workspace = true }
tracing     = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio    = { workspace = true, features = ["macros", "rt-multi-thread"] }
# C.4 stage tests build minimal EPUB ZIPs on the fly.
zip      = { workspace = true }
