[package]
name         = "ab-tag-write"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "Two-pass embedded-tag writer (ADR-0028): early DNA pass + late AI pass with sticky user-edit semantics."

[lints]
workspace = true

[dependencies]
ab-core       = { workspace = true }
ab-db         = { workspace = true }
ab-pipeline   = { workspace = true }
async-trait   = { workspace = true }
# Same crate as `tag-read` uses for reading. Writing routes
# through `lofty::tag::Tag::save_to`-style APIs; the typed
# `ItemKey` mapping is symmetric with what tag-read pulls.
lofty         = { workspace = true }
# Cover-art fetch (C3a). Streamed download with a hard size
# cap so a misbehaving CDN can't OOM the daemon. `futures` is
# the StreamExt source for `bytes_stream().next()`.
futures       = { workspace = true }
reqwest       = { workspace = true }
sqlx          = { workspace = true }
thiserror     = { workspace = true }
tokio         = { workspace = true }
tracing       = { workspace = true }
# Provenance-audit (`mass_edit_history`) needs a per-run batch
# id; UUID v4 is the convention the schema's `batch_id` comment
# pins.
uuid          = { workspace = true }

[dev-dependencies]
tempfile      = { workspace = true }
# Tiny in-process HTTP server for cover-fetcher tests.
tokio         = { workspace = true, features = ["macros", "rt-multi-thread", "net"] }
tokio-util    = { workspace = true }
