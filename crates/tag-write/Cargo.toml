[package]
name         = "ab-tag-write"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "Two-pass embedded-tag writer (ADR-0028): early DNA pass + late AI pass with sticky user-edit semantics."

[lints]
workspace = true

[dependencies]
ab-core       = { workspace = true }
# Cover-art fetch + pixel-bomb guard moved to `ab-covers` in
# slice B.15 (ADR-0030). tag-write re-exports `CoverClient` +
# `CoverFetchError` for back-compat; tag-write callers + the
# `TagWriteEarlyStage` fallback in `stage.rs` route through
# `ab_covers::*`.
ab-covers     = { workspace = true }
ab-db         = { workspace = true }
ab-pipeline   = { workspace = true }
async-trait   = { workspace = true }
# Same crate as `tag-read` uses for reading. Writing routes
# through `lofty::tag::Tag::save_to`-style APIs; the typed
# `ItemKey` mapping is symmetric with what tag-read pulls.
lofty         = { workspace = true }
reqwest       = { workspace = true }
sqlx          = { workspace = true }
thiserror     = { workspace = true }
tokio         = { workspace = true }
tracing       = { workspace = true }
# Provenance-audit (`mass_edit_history`) needs a per-run batch
# id; UUID v4 is the convention the schema's `batch_id` comment
# pins.
uuid          = { workspace = true }

[dev-dependencies]
tempfile      = { workspace = true }
tokio         = { workspace = true, features = ["macros", "rt-multi-thread", "net"] }
tokio-util    = { workspace = true }
