# Cargo aliases for our build commands and a handful of build flags
# that apply to every member.

[alias]
xtask  = "run --quiet --package xtask --"
check-all  = "xtask check"
fmt-check  = "fmt --all -- --check"
clippy-all = "clippy --workspace --all-targets --all-features -- -D warnings"

# Self-hosted runner builds reuse this cache so 16k books worth of
# fingerprint test data doesn't get redownloaded each time.
[build]
target-dir = "target"
# Use lld via cargo if installed; macOS uses ld64 by default which is fine.

[target.aarch64-apple-darwin]
rustflags = [
    # Apple Silicon native vectorization.
    "-C", "target-cpu=apple-m1",
    # Backtraces stay legible after `strip = "symbols"`.
    "-C", "force-frame-pointers=yes",
    # Swift FFI bridge (crates/transcript) statically links a
    # Swift archive that depends on `libswift_Concurrency.dylib`
    # et al. macOS 12+ ships the Swift runtime at `/usr/lib/swift`;
    # the rpath lets dyld find it at launch. Without it, any
    # binary that pulls in `ab-transcript` fails with
    # "Library not loaded: @rpath/libswift_Concurrency.dylib".
    # `cargo:rustc-link-arg=` from the bridge crate's build.rs
    # only applies to its own crate's targets — not transitively
    # to downstream binaries — so it must live here.
    # Harmless for binaries that don't link the bridge: just an
    # extra unused rpath search path.
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]
