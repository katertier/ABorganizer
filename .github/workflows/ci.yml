name: CI

on:
  push:
    branches: [main]
  # Fire on every PR regardless of base branch so stacked PRs
  # (a chain of branches awaiting merge) are gated end-to-end.
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # `sqlx::query!()` macros use the committed `.sqlx/` query cache
  # rather than connecting to a live DB. The cache is refreshed by
  # `scripts/sqlx-prepare.sh` whenever a query changes, and the
  # `sqlx-prepare` CI job below verifies the cache stays in sync.
  SQLX_OFFLINE: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # `prefix-key: v1-rust` invalidates the prior `v0-rust-clippy-…`
      # cache that PR #28 hit. The corrupted-cache symptom was
      # `cargo clippy …` failing with
      #   error: unexpected argument 'clippy' found
      #   Usage: rustup-init[EXE] [OPTIONS]
      # — i.e. the restored `~/.cargo/bin/cargo` was actually
      # `rustup-init`. Bumping the prefix forces a fresh cache on
      # the first run after this lands; subsequent runs hit the
      # `v1-rust-clippy-…` keyspace and stay green.
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Every rust-cache step uses `prefix-key: v1-rust` to invalidate
  # the v0-rust-* slots that hit partial-restore corruption
  # (cargo symlink replaced with rustup-init). See the clippy job
  # above for the diagnostic. Applying uniformly across the matrix
  # because PR #29 surfaced the same symptom on the audit job
  # after PR #28 fixed only clippy + sqlx.

  test:
    name: cargo test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
      - run: cargo test --workspace --all-targets

  xtask:
    name: cargo xtask check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
      - run: cargo xtask check

  deny:
    name: cargo deny
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
      # Run cargo-deny directly. The official action is Docker-based
      # (Linux-only); we want to keep the entire CI matrix on macOS so
      # toolchain assumptions match the target.
      - run: cargo install --locked cargo-deny || true
      - run: cargo deny check

  audit:
    name: cargo audit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # No rust-cache: the cache occasionally restored a state
      # where `cargo` resolved to `rustup-init` (see PR #28's
      # diagnostic threads). The `cargo install --locked
      # cargo-audit` step rebuilds cargo-audit in ~30s; saving
      # the cache isn't worth chasing the partial-restore
      # corruption.
      - run: cargo install --locked cargo-audit || true
      # `--ignore` mirrors the ignore list in deny.toml. Keep in sync.
      # Ignores:
      # - RUSTSEC-2023-0071 (rsa Marvin attack): pulled via sqlx-mysql
      #   which our `mysql` feature never enables. Unreachable from
      #   the binary. cargo-deny's feature-graph analysis already
      #   excludes it; cargo-audit scans Cargo.lock blindly.
      # - RUSTSEC-2024-0436 (paste unmaintained): pulled transitively
      #   by lofty 0.24. Replacement requires a lofty upstream PR.
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0436

  sqlx-prepare:
    name: sqlx query cache
    runs-on: macos-14
    # Verifies the committed `.sqlx/` cache matches what the macros
    # would produce against a fresh schema. Catches stale caches
    # whenever a query is changed but `scripts/sqlx-prepare.sh` was
    # not rerun.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # No rust-cache: this job hit a partial-restore corruption
      # where the cached `~/.cargo/bin/cargo` shim resolved to
      # `rustup-init` after restore, so subsequent `cargo install`
      # / `cargo sqlx prepare` failed with
      # `error: unexpected argument 'install' found`. The bump
      # to `prefix-key: v1-rust` (commit on this branch) didn't
      # help because the same failure pattern repopulated the
      # new slot. Removing the cache is the surgical fix; the
      # `cargo install --locked sqlx-cli` step rebuilds in
      # ~30 s and the prepare step verifies a tiny `.sqlx/`
      # cache against the prep DB.
      - run: cargo install --locked sqlx-cli --no-default-features --features sqlite,rustls --version "~0.8" || true
      - name: Apply all migrations to a prep DB
        run: |
          # Apply every library + ephemeral migration into one prep DB
          # so every `sqlx::query!()` call's referenced table exists.
          # Mirrors the loop in `scripts/sqlx-prepare.sh`. The
          # `IF NOT EXISTS` / `OR IGNORE` rewrite is needed because a
          # few tables (e.g. `meta`) are declared in both schemas with
          # the same shape; production runs them against separate DBs
          # and stays strict — this rewrite never touches source files.
          rm -f /tmp/aborg-prep.db
          for migration in crates/db/migrations/library/*.sql crates/db/migrations/ephemeral/*.sql; do
            sed -E 's/CREATE (UNIQUE )?(TABLE|INDEX) /CREATE \1\2 IF NOT EXISTS /g; s/INSERT INTO /INSERT OR IGNORE INTO /g' \
              "$migration" | sqlite3 /tmp/aborg-prep.db
          done
      - name: Verify `.sqlx/` is up to date
        env:
          DATABASE_URL: "sqlite:///tmp/aborg-prep.db"
        run: cargo sqlx prepare --workspace --check
