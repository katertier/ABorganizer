name: Self-hosted smoke (FFI / Apple Intelligence)

# Self-hosted runner on the maintainer's Mac mini. Used today as a
# smoke test that the runner toolchain stays healthy; once the Swift
# FFI bridge lands, real FFI tests will be added here (they require
# Apple Intelligence which only runs on macOS 26+ Apple Silicon).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/audio/**'
      - 'crates/audiologo/**'
      - 'crates/transcript/**'
      - 'crates/fingerprint/**'
      - '.github/workflows/ffi.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ffi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-smoke:
    name: runner toolchain smoke
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: rustc version
        run: rustc -vV
      - name: workspace build
        run: cargo build --workspace --all-targets
      - name: workspace tests
        run: cargo test --workspace --all-targets
      - name: xtask check
        run: cargo xtask check
      - name: macOS version
        run: sw_vers
      # Real FFI tests (transcribe, NLLanguageRecognizer) land once the
      # Swift bridge is wired into crates/audio/.
